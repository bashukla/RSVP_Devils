<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <link rel="stylesheet" href="css/reset-password.css">
</head>
<body>

    <div class="container">

        <form id="reset-password-form" class="card-form">
        
            <h2>Reset Password</h2>
            <div class="password-wrapper">
                <label for="new-password">New Password:</label>
                <input type="password" id="new-password" required>
                <span class="eye-icon" id="toggle-new">👁️</span>
            </div>
        
            <!-- Strength meter -->
            <div id="strength-text"></div>
            <div class="strength-bar">
                <div id="strength-fill"></div>
            </div>
        
            <!-- Password rules checklist -->
            <ul id="password-rules">
                <li id="rule-length">✔ At least 8 characters</li>
                <li id="rule-uppercase">✔ One uppercase letter</li>
                <li id="rule-number">✔ One number</li>
                <li id="rule-special">✔ One special character</li>
            </ul>
        
            <div class="password-wrapper">
                <label for="confirm-password">Confirm Password:</label>
                <input type="password" id="confirm-password" required>
                <span class="eye-icon" id="toggle-confirm">👁️</span>
            </div>
        
            <button type="submit" class="button" id="submit-btn">
                <span id="btn-text">Reset Password</span>
                <span id="spinner" class="spinner hidden"></span>
            </button>
        
            <p id="message" class="message"></p>
        </form>

    </div>
    <script src="js/reset-password.js"></script>
    <div id="toast-container"></div>
</body>
</html>
