<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSVP Devils | Browse Events</title>
  <link rel="stylesheet" href="css/events.css">
  <!-- Google Fonts for a cleaner look -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <nav class="navbar">
    <div class="logo">RSVP Devils</div>
  
    <div class="hamburger" id="hamburger">
      ☰
    </div>
  </nav>
  
  <!-- Slide Menu -->
  <div class="nav-links" id="navMenu">
    <a href="/index.html"><i class="fas fa-house"></i> Home</a>
    <a href="/events.html"><i class="fas fa-calendar"></i> Events</a>
    <a href="/reminders.html"><i class="fas fa-bell"></i> Reminders</a>
    <a href="/dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="/userSettings.html"><i class="fas fa-user-gear"></i> Settings</a>
  </div>
  
  <!-- Dark overlay -->
  <div id="overlay" class="overlay"></div>
  
  <!-- ASU Header Bar -->
  <div class="asu-header-bar"></div>

  <!-- Campus Banner -->
  <div class="campus-banner">
    <img src="/images/sparky.png" alt="ASU Logo" class="asu-logo">
    <div class="banner-text">
      <h1>Browse Campus Events</h1>
      <p class="subtitle">Discover what's happening at Arizona State University.</p>
    </div>
  </div>

  <div class="controls-container">
    <input type="text" id="searchInput" placeholder="Search events (e.g., Football, Career)...">

    <select id="categoryFilter">
      <option value="">All Categories</option>
      <option value="Academic">Academic</option>
      <option value="Social">Social</option>
      <option value="Sports">Sports</option>
    </select>

    <select id="sortFilter">
      <option value="date-asc">Date (Soonest First)</option>
      <option value="date-desc">Date (Latest First)</option>
    </select>
  </div>

  <div class="top-controls">
  <!-- New Event Button -->
  <div class="new-event-container">
    <button id="newEventBtn">+ New Event</button>
  </div>
  <!-- Toggle Buttons -->
  <div class="toggle-container">
    <button id="upcomingBtn" class="active">Upcoming</button>
    <button id="pastBtn">Past</button>
  </div>

</div>

  <div class="events-container" id="eventList">
    <!-- Events will be injected here by JavaScript -->
    <div class="empty-message">
      Loading events...
    </div>
  </div>

  <button class="back-btn" onclick="goDashboard()">← Back to Home</button>
  <script src="js/events.js"></script>
  <script src="js/navbar.js"></script>
</body>
</html>
