<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="/images/asu-2.svg">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="css/DarkTheme.css">
    <script src="js/theme-toggle.js"></script>
</head>

<nav class="navbar">
    <div class="hamburger" id="hamburger">&#9776;</div>
    <div class="logo">RSVP Devils</div>
    <div class="profile-btn" id="profileBtn">
      <i class="fas fa-user-circle"></i>
    </div>
    <div class="nav-right">
      <button id="theme-toggle-btn">🌙 Dark Mode</button>
      <div class="hamburger" onclick="toggleMenu()"></div>
    </div>
  </nav>
  
  <!-- Profile Dropdown -->
  <div class="profile-dropdown hidden" id="profileDropdown">
    <a href="/userSettings.html"><i class="fas fa-user-gear"></i> Settings</a>
    <a href="#" id="dropdownLogout"><i class="fas fa-sign-out-alt"></i> Logout</a>
  </div>

<body>
    <div class="container">
        <div class="header">
            <img src="/images/ASU Logos/Arizona-State-Sun-Devils-logo.png" alt="ASU Logo" class="asu-logo">
            <h1>Users</h1>
            <div>
                <button id="refreshButton">Refresh List</button>
                <button id="logoutButton">Log Out</button>
            </div>
        </div>
        <div class="user-list" id="userList"></div>
    </div>
    <script src="/js/dashboard.js"></script>
    <script src="/js/datamodel.js"></script>
  <script src="/js/background.js"></script>
</body>
</html>
