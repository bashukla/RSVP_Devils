<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="icon" type="image/svg+xml" href="/images/asu-2.svg">
    <link rel="stylesheet" href="css/logon.css">
    <link rel="stylesheet" href="css/DarkTheme.css">
    <script src="js/theme-toggle.js"></script>
</head>

<body>
    <div class="container">
    <img src="/images/ASU Logos/asu-logo-small.png" alt="ASU Logo" class="asu-logo">
        <h1>Welcome to The Devils</h1>
         <div class="nav-right">
            <button id="theme-toggle-btn">🌙 Dark Mode</button>
            <div class="hamburger" onclick="toggleMenu()"></div>
        </div>
        <div class="tab">
            <button class="tab-button active" id="login-tab">Log In</button>
            <button class="tab-button" id="create-account-tab">Create Account</button>
        </div>

        <div id="form-container">
            <!-- Logon Form -->
            <form id="logon-form" class="active-form">
                <label for="login-email">Email:</label>
                <input type="email" id="login-email" placeholder="Enter your email" required>

                <label for="login-password">Password:</label>
                <input type="password" id="login-password" placeholder="Enter your password" required>

                <button type="submit" class="button">Log In</button>
                <p class="forgot-link" id="forgot-password-link">Forgot Password?</p>
            </form>
            <!-- Forgot Password Form -->
            <form id="forgot-password-form">
                <label for="forgot-email">Enter your email:</label>
                <input type="email" id="forgot-email" placeholder="Enter your email" required>

                <button type="submit" class="button">Send Reset Link</button>
            </form>

            <!-- Create Account Form -->
            <form id="create-account-form">
                <label for="create-email">Email:</label>
                <input type="email" id="create-email" placeholder="Enter your email" required>

                <label for="create-password">Password:</label>
                <input type="password" id="create-password" placeholder="Create your password" required>

                <button type="submit" class="button">Create Account</button>
            </form>
            

            <p id="message" class="message"></p>
        </div>
    </div>

    <script src="js/logon.js"></script>
</body>

</html>
